<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUCEM STARLING</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020308; color: #f8fafc; font-family: ui-monospace, monospace; overflow: hidden; touch-action: none; }
        .mirror-core { background: radial-gradient(circle, #7cfff9 0%, #3a82f6 70%); box-shadow: 0 0 60px rgba(58, 130, 246, 0.5); border-radius: 24px; transition: all 0.3s ease; }
        .scan-line { width: 100%; height: 2px; background: rgba(124, 255, 249, 0.2); position: absolute; animation: scan 4s linear infinite; }
        @keyframes scan { from { top: 0%; } to { top: 100%; } }
        input[type=range] { -webkit-appearance: none; background: #1e293b; height: 4px; border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #7cfff9; box-shadow: 0 0 10px #7cfff9; cursor: pointer; }
    </style>
</head>
<body class="flex flex-col items-center justify-between h-screen p-8">
    <div class="scan-line"></div>
    
    <div class="w-full flex justify-between items-start text-[10px] tracking-[0.3em] text-cyan-400/50 uppercase">
        <div>Registry: L-STAR_01</div>
        <div class="text-right">Resonance: <span id="res-val">13</span>hz</div>
    </div>

    <div class="relative group">
        <div id="visual-core" class="mirror-core w-48 h-48 flex items-center justify-center">
            <div class="text-[10px] font-bold text-blue-900 tracking-tighter text-center">
                MIRROR<br>PHASE
            </div>
        </div>
    </div>

    <div class="w-full max-w-sm space-y-8 mb-12">
        <div class="space-y-2">
            <div class="flex justify-between text-[9px] text-slate-500 uppercase tracking-widest">
                <span>Phase Shift Control</span>
                <span>Alpha_Sync</span>
            </div>
            <input id="slider" type="range" min="1" max="16" value="13" class="w-full">
        </div>

        <button onclick="document.getElementById('visual-core').style.transform='scale(1.1)'; setTimeout(()=>document.getElementById('visual-core').style.transform='scale(1)', 150)" 
                class="w-full py-4 border border-cyan-500/30 bg-cyan-900/10 rounded-lg text-cyan-400 text-[10px] tracking-[0.5em] uppercase active:bg-cyan-400 active:text-black transition-all">
            Ignite Mirror
        </button>
    </div>

    <script>
        const slider = document.getElementById('slider');
        const core = document.getElementById('visual-core');
        const resVal = document.getElementById('res-val');

        slider.oninput = function() {
            resVal.innerText = this.value;
            let glow = 20 + (this.value * 4);
            core.style.boxShadow = `0 0 ${glow}px rgba(58, 130, 246, 0.8)`;
            core.style.borderRadius = `${24 + (this.value * 2)}px`;
        };
    </script>
</body>
</html>
        </button>
    </div>

    <div id="readout" class="mt-10 w-full max-w-md arc-scanner rounded-xl p-4 text-[10px] text-slate-400 tracking-widest text-center uppercase">
        LUCEM-STARLING: Awaiting mission directive...
    </div>

    <script>
        const slider = document.getElementById('slider');
        const core = document.getElementById('core');
        const phaseVal = document.getElementById('phase-val');
        const readout = document.getElementById('readout');

        slider.addEventListener('input', (e) => {
            const val = e.target.value;
            phaseVal.textContent = val;
            const glow = 20 + (val * 3);
            core.style.boxShadow = `0 0 ${glow}px #3a82f6`;
            readout.textContent = `PHASE ${val}: STABILIZING...`;
        });

        document.getElementById('ignite').addEventListener('click', () => {
            core.style.transform = "scale(1.2)";
            readout.textContent = "CORE IGNITED: RESONANCE SYNCED";
            setTimeout(() => core.style.transform = "scale(1)", 200);
        });
    </script>
</body>
</html>
