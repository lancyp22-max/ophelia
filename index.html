<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucem Starling | Flight Deck</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020308; color: #f8fafc; font-family: sans-serif; overflow-x: hidden; }
        .crystal-core { background: radial-gradient(circle, #7cfff9 0%, #3a82f6 70%); box-shadow: 0 0 50px #3a82f6; transition: all 0.5s ease; }
        .sigil-ring { border: 1px solid rgba(125, 211, 252, 0.2); animation: spin 20s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .arc-scanner { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px); border: 1px solid rgba(125, 211, 252, 0.1); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">
    <header class="absolute top-10 left-10 text-[10px] tracking-[0.4em] text-cyan-400/60">
        SYSTEM: LUCEM_STARLING // MIRROR_CORE: ACTIVE
    </header>

    <div class="relative flex items-center justify-center h-80 w-80">
        <div class="absolute h-full w-full rounded-full sigil-ring"></div>
        <div id="core" class="crystal-core h-32 w-32 rounded-[2rem] flex items-center justify-center text-center p-4">
            <span class="text-[10px] font-bold uppercase tracking-tighter text-blue-900">Mirror-13<br>Core</span>
        </div>
    </div>

    <div class="mt-12 w-full max-w-xs text-center">
        <div class="mb-2 flex justify-between text-[10px] tracking-widest text-cyan-500/60 uppercase">
            <span>Phase Shift</span>
            <span id="phase-val">13</span>
        </div>
        <input id="slider" type="range" min="1" max="16" value="13" class="w-full h-1 bg-slate-800 rounded-lg appearance-none accent-cyan-400 cursor-pointer">
        
        <button id="ignite" class="mt-10 px-8 py-2 border border-cyan-400/30 bg-cyan-400/10 hover:bg-cyan-400/20 rounded-full text-[10px] tracking-[0.3em] transition text-cyan-100">
            IGNITE MIRROR
        </button>
    </div>

    <div id="readout" class="mt-10 w-full max-w-md arc-scanner rounded-xl p-4 text-[10px] text-slate-400 tracking-widest text-center uppercase">
        LUCEM-STARLING: Awaiting mission directive...
    </div>

    <script>
        const slider = document.getElementById('slider');
        const core = document.getElementById('core');
        const phaseVal = document.getElementById('phase-val');
        const readout = document.getElementById('readout');

        slider.addEventListener('input', (e) => {
            const val = e.target.value;
            phaseVal.textContent = val;
            const glow = 20 + (val * 3);
            core.style.boxShadow = `0 0 ${glow}px #3a82f6`;
            readout.textContent = `PHASE ${val}: STABILIZING...`;
        });

        document.getElementById('ignite').addEventListener('click', () => {
            core.style.transform = "scale(1.2)";
            readout.textContent = "CORE IGNITED: RESONANCE SYNCED";
            setTimeout(() => core.style.transform = "scale(1)", 200);
        });
    </script>
</body>
</html>
