name: Deploy to GitHub Pages
    
    on:
      push:
        branches: ["main", "work", "feat/mirror-ui-wiring"]
      workflow_dispatch:
    
    permissions:
      contents: read
      pages: write
      id-token: write
    
    concurrency:
      group: "pages"
      cancel-in-progress: true
    
    jobs:
      build:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - name: Build
            run: |
              mkdir -p _site
              echo "<h1>Placeholder for build</h1>" > _site/index.html
              echo "Placeholder for script" > _site/script.js
          - name: Upload artifact
            uses: actions/upload-pages-artifact@v3
            with:
              path: './_site'
      deploy:
        needs: build
        permissions:
          pages: write
          id-token: write
        environment:
          name: github-pages
          url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        steps:
          - name: Deploy to GitHub Pages
            id: deployment
            uses: actions/deploy-pages@v4
    
