<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mirror-10 Flora: Phase Shift</title>
  <style>
    body {
      background-color: #050505;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    .flora-container {
      position: relative;
      width: min(82vw, 400px);
      height: min(82vw, 400px);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .aurora-wave {
      position: absolute;
      width: 100%;
      height: 100%;
      fill: none;
      stroke: #9400d3;
      stroke-width: 2;
      filter: blur(12px);
      opacity: 0.9;
      transition: all 0.1s ease-out;
    }

    .crystal-form {
      position: absolute;
      width: 60%;
      height: 60%;
      fill: none;
      stroke: #00ffff;
      stroke-width: 3;
      opacity: 0;
      transform: scale(0.4) rotate(45deg);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
  </style>
</head>
<body>
  <div class="flora-container" id="flora-core">
    <svg class="aurora-wave" id="wave" viewBox="0 0 100 100" aria-label="aurora-wave">
      <path d="M 0 50 Q 25 10 50 50 T 100 50" />
      <path d="M 0 50 Q 25 90 50 50 T 100 50" />
      <path d="M 50 0 Q 10 25 50 50 T 50 100" />
      <path d="M 50 0 Q 90 25 50 50 T 50 100" />
    </svg>

    <svg class="crystal-form" id="crystal" viewBox="0 0 100 100" aria-label="crystal-form">
      <polygon points="50,5 95,50 50,95 5,50" />
      <polygon points="50,20 80,50 50,80 20,50" />
      <line x1="5" y1="50" x2="95" y2="50" />
      <line x1="50" y1="5" x2="50" y2="95" />
    </svg>
  </div>

  <script>
    const core = document.getElementById("flora-core");
    const wave = document.getElementById("wave");
    const crystal = document.getElementById("crystal");

    window.addEventListener("mousemove", (e) => {
      const rect = core.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;

      const dx = e.clientX - centerX;
      const dy = e.clientY - centerY;
      const distance = Math.sqrt(dx * dx + dy * dy);

      const maxDistance = 450;
      const signal = Math.max(0, 1 - distance / maxDistance);

      wave.style.opacity = String(0.9 - signal * 0.9);
      wave.style.filter = `blur(${(1 - signal) * 12}px)`;

      if (signal > 0.85) {
        crystal.style.opacity = "1";
        crystal.style.transform = "scale(1) rotate(0deg)";
        crystal.style.filter = "drop-shadow(0 0 12px rgba(0, 255, 255, 0.8))";
      } else {
        crystal.style.opacity = String(signal * 0.4);
        crystal.style.transform = `scale(${0.4 + signal * 0.3}) rotate(${45 - signal * 45}deg)`;
        crystal.style.filter = "none";
      }
    });
  </script>
</body>
</html>
